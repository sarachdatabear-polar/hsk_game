<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <title>MASTERY — blooming leaf/star/book in jade and sun (spec §8.4)</title>
  <rect x="5" y="5" width="110" height="110" rx="26" fill="#FBF3DC" stroke="#E2CFA3" stroke-width="3"/>
  <rect x="10.5" y="10.5" width="99" height="99" rx="21" fill="none" stroke="#FFFDF2" stroke-width="2.5"/>
  <!-- blooming leaves -->
  <g stroke="#2F7F5C" stroke-width="3" stroke-linejoin="round">
    <path d="M40 82c-12 -4 -18 -16 -16 -28 9 4 15 13 16 22 3 -3 7 -4 11 -3z" fill="#78B86B"/>
    <path d="M80 82c12 -4 18 -16 16 -28 -9 4 -15 13 -16 22 -3 -3 -7 -4 -11 -3z" fill="#78B86B"/>
  </g>
  <!-- rising star -->
  <path d="M60 18 66.5 32.5 82 34.5 70.5 45.5 73.5 61 60 53.5 46.5 61 49.5 45.5 38 34.5 53.5 32.5z"
        fill="#F5C85B" stroke="#8A5C14" stroke-width="3" stroke-linejoin="round"/>
  <!-- bookmark ribbon -->
  <path d="M54 58h12v20l-6 -4.5 -6 4.5z" fill="#E65A4F" stroke="#93321F" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- open book base -->
  <g stroke="#7A5A44" stroke-width="3.5" stroke-linejoin="round">
    <path d="M60 84c-7 -5 -17 -5 -24 -2v20c7 -3 17 -3 24 2z" fill="#FFF8E8"/>
    <path d="M60 84c7 -5 17 -5 24 -2v20c-7 -3 -17 -3 -24 2z" fill="#FFF3D6"/>
    <path d="M60 86v18" stroke-width="2.5"/>
  </g>
  <!-- ascent sparkles -->
  <circle cx="30" cy="28" r="2.5" fill="#4FAE8A"/>
  <circle cx="92" cy="26" r="2.5" fill="#F5C85B"/>
  <circle cx="98" cy="52" r="2" fill="#78B86B"/>
</svg>
