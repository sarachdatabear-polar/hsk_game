name: CI

on:
  pull_request:
  push:
    branches:
      - development

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (no-op until lint script exists)
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build
