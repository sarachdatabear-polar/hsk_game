name: CI

on:
  pull_request:
  push:
    branches:
      - development

permissions:
  contents: read

# Supersede an in-flight run when new commits land on the same ref (PR branch or
# development) — no point finishing a stale run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build
