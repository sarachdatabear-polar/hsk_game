<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <title>RETRY — soft coral ripple, curved arrow, paper fragments (spec §8.3, non-punitive)</title>
  <rect x="5" y="5" width="110" height="110" rx="26" fill="#FBF3DC" stroke="#E2CFA3" stroke-width="3"/>
  <rect x="10.5" y="10.5" width="99" height="99" rx="21" fill="none" stroke="#FFFDF2" stroke-width="2.5"/>
  <!-- soft coral ripple + wobble ring -->
  <circle cx="60" cy="60" r="34" fill="#E65A4F" opacity=".12"/>
  <circle cx="60" cy="60" r="34" fill="none" stroke="#E65A4F" stroke-width="3" opacity=".45"/>
  <circle cx="60" cy="60" r="42" fill="none" stroke="#E88A7D" stroke-width="2.5" stroke-dasharray="10 7" stroke-linecap="round" opacity=".6"/>
  <!-- curved retry arrow -->
  <path d="M78 46a24 24 0 1 0 6 16" fill="none" stroke="#E65A4F" stroke-width="8" stroke-linecap="round"/>
  <path d="M78 46 76 33M78 46 65 43" fill="none" stroke="#E65A4F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- paper fragments -->
  <rect x="86" y="78" width="10" height="7" rx="2" fill="#FFF8E8" stroke="#C9A265" stroke-width="1.5" transform="rotate(18 91 81.5)"/>
  <rect x="24" y="30" width="9" height="6" rx="2" fill="#FFF8E8" stroke="#C9A265" stroke-width="1.5" transform="rotate(-14 28.5 33)"/>
</svg>
